; ESP32-S3 CANable SLCAN — PlatformIO Configuration
;
; Uses custom board definition (boards/esp32s3_slcan.json) with:
;   - USB CDC on boot (ARDUINO_USB_CDC_ON_BOOT=1)
;   - CANable VID/PID (0x16D0:0x117E)
;   - 8MB flash, PSRAM enabled
;
; DTR workaround: -Wl,--wrap=tud_cdc_n_connected makes TinyUSB CDC
; work even when host software doesn't assert DTR (see src/dtr_fix.c)

[env:esp32-s3-slcan]
platform = espressif32
board = esp32s3_slcan
board_dir = boards
framework = arduino
monitor_speed = 500000

build_flags =
    -DUSB_VID=0x16D0
    -DUSB_PID=0x117E
    -Wl,--wrap=tud_cdc_n_connected

extra_scripts =
    post:fix_usb_strings.py
