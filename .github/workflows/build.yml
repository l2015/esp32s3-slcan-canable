name: Build Firmware

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/esp32-s3-slcan/firmware.bin
            .pio/build/esp32-s3-slcan/bootloader.bin
            .pio/build/esp32-s3-slcan/partitions.bin
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Pack firmware for WebUSB flasher
        run: |
          mkdir -p release
          cp firmware.bin bootloader.bin partitions.bin release/
          cd release
          tar -czf ../esp32s3-canable-slcan-firmware.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            firmware.bin
            bootloader.bin
            partitions.bin
            esp32s3-canable-slcan-firmware.tar.gz
          generate_release_notes: true
